input {
  file {
    path => "/usr/share/logstash/logs/threat_logs.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  if ![@timestamp] {
    mutate {
      add_field => { "@timestamp" => "%{timestamp}" }
    }
  }

  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "threat-logs"
  }

  stdout { codec => rubydebug }
}